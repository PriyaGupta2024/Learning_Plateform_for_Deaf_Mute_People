{% extends "base.html" %}
{% block content %}
  <div class="max-w-3xl mx-auto p-6 bg-white rounded-lg shadow">
    <h2 class="text-xl font-semibold mb-4">{{ quiz.title }}</h2>

    <form method="post" action="{% url 'submit_quiz' quiz.id %}">
      {% csrf_token %}
      {% for question in questions %}
        <div class="mb-6">
          <p class="font-medium">{{ forloop.counter }}. {{ question.text }}</p>
          <label class="block mt-2"><input type="radio" name="question_{{ question.id }}" value="1"> {{ question.option_1 }}</label>
          <label class="block mt-1"><input type="radio" name="question_{{ question.id }}" value="2"> {{ question.option_2 }}</label>
          <label class="block mt-1"><input type="radio" name="question_{{ question.id }}" value="3"> {{ question.option_3 }}</label>
        </div>
      {% empty %}
        <p>No questions available for this quiz.</p>
      {% endfor %}

      <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded">Submit</button>
    </form>
  </div>
{% endblock %}
